<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Scorix IPC Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex">

<div class="flex flex-col w-full max-w-3xl mx-auto bg-white shadow-lg">

    <!-- HEADER -->
    <div class="px-4 py-3 border-b text-sm font-semibold bg-gray-50">
        Scorix IPC Console
    </div>

    <!-- CONTENT -->
    <div class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">

        <!-- COMMAND INVOKE -->
        <div>
            <div class="text-xs font-semibold text-gray-600 mb-1">Command (invoke)</div>
            <div class="flex gap-2">
                <input id="cmd-input"
                       class="flex-1 border rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-blue-200"
                       placeholder="Type command..."/>
                <button id="cmd-send" class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600">
                    Send
                </button>
            </div>
        </div>

        <!-- COMMAND CHUNK STREAM -->
        <!--        <div>-->
        <!--            <div class="flex items-center justify-between mb-1">-->
        <!--                <div class="text-xs font-semibold text-gray-600">Command Chunk (stream)</div>-->
        <!--                <button id="stream-start"-->
        <!--                        class="bg-green-500 text-white px-3 py-1 rounded text-xs hover:bg-green-600">-->
        <!--                    Start Stream-->
        <!--                </button>-->
        <!--            </div>-->
        <!--        </div>-->
        <!-- EVENT -->
        <div>
            <div class="text-xs font-semibold text-gray-600 mb-1">Event (emit/on)</div>
            <div class="flex gap-2">
                <input id="event-input"
                       class="flex-1 border rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-purple-200"
                       placeholder="Emit event..."/>
                <button id="event-send"
                        class="bg-purple-500 text-white px-4 py-2 rounded text-sm hover:bg-purple-600">
                    Emit
                </button>
            </div>
        </div>

        <!-- LOG AREA -->
        <div class="flex-1 overflow-hidden">
            <div class="text-xs font-semibold text-gray-600 mb-1">Log</div>
            <div id="log"
                 class="h-full overflow-y-auto bg-gray-50 border rounded p-3 text-xs space-y-1 font-mono">
            </div>
        </div>

    </div>
</div>

<script type="module">
    const logBox = document.getElementById("log")

    function log(text) {
        const div = document.createElement("div")
        div.textContent = text
        logBox.appendChild(div)
        logBox.scrollTop = logBox.scrollHeight
    }

    // COMMAND INVOKE
    document.getElementById("cmd-send").onclick = async () => {
        const input = document.getElementById("cmd-input")
        const text = input.value.trim()
        if (!text) return
        input.value = ""

        log("→ invoke: " + text)

        try {
            const res = await window.scorix.invoke("cmd-send", {message: text})
            log("✓ done: " + JSON.stringify(res))
        } catch (err) {
            log("✗ error: " + err.message)
        }
    }

    // COMMAND CHUNK STREAM
    document.getElementById("stream-start").onclick = async () => {
        log("→ start stream")

        try {
            const result = await window.scorix.invoke("stream-send", {}, {
                onChunk: (chunk) => {
                    log("chunk: " + JSON.stringify(chunk))
                }
            })

            log("✓ stream done: " + JSON.stringify(result))
        } catch (err) {
            log("✗ stream error: " + err.message)
        }
    }

    // EVENT
    document.getElementById("event-send").onclick = async () => {
        const input = document.getElementById("event-input")
        const text = input.value.trim()
        if (!text) return
        input.value = ""

        await window.scorix.emit("event:send", {message: text})
        log("→ emitted: " + text)
    }

    window.scorix.on("event:send", (data, error) => {
        log("← event: " + JSON.stringify(data))
        if (error) {
            log("← event error: " + error)
        }
    })
</script>

</body>
</html>
