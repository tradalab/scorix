# BUILD/PACKAGING MANIFEST — read by the scorix CLI (build, package, appcast),
# NOT by your app at runtime. Runtime configuration lives in code
# (app.Options in main.go, SetModuleConfig in svc). Keep overlapping values
# (window size, security) in sync as documentation; code wins.
app:
  name: {{ .Name }}
  version: 1.0.0
  identifier: com.example.{{ .Name }}
  description: "{{ .Name }} project"

mode: app

web:
  host: 127.0.0.1
  port: 8080

window:
  title: {{ .Name }}
  width: 800
  height: 600
  debug: true

security:
  csp: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
  allow_right_click: true
  allowlist:
    fs: true
    shell: true
    http: true
    clipboard: true
    notification: true

logger:
  level: info
  format: console
  output: stdout
