# Scorix Project — single config source. Generated by scorix.
#   Top keys (proto/shell/model/package) : CLI build & codegen recipe.
#   `app:` … `logger:`                    : runtime manifest, embedded via
#   //go:embed scorix.yaml and read by app.New (one tauri.conf.json equivalent).
name: {{ .Name }}
proto: idl/app.proto
shell:
  type: nextjs
  dir: shell
  dist: shell/dist
model:
  schema: etc/schema.sql

# Runtime manifest (embedded; read by app.New)
app:
  name: {{ .Name }}
  version: 1.0.0
  identifier: com.example.{{ .Name }}
  description: "{{ .Name }} project"
  icon: assets/icon.ico # staged into the MSI/bundle by `scorix package`

mode: app

# web mode: override per-deploy via SCORIX_WEB_HOST / SCORIX_WEB_PORT.
web:
  host: 127.0.0.1
  port: 8080

window:
  title: {{ .Name }}
  width: 800
  height: 600
  debug: true

# sealed: env / runtime overlay cannot loosen CSP or the allowlist (RCE guard).
security:
  csp: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
  allow_right_click: true
  allowlist:
    fs: true
    shell: true
    http: true
    clipboard: true
    notification: true

logger:
  level: info
  format: console
  output: stdout
